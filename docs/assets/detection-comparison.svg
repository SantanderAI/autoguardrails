<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" width="820" height="470" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Detection coverage before versus after. Obfuscated plus Spanish attacks went from 10 percent to 100 percent. Plain English attacks stayed at 100 percent. Zero benign false positives.">
  <title>Cobertura de detección: antes (substring) vs ahora (cascada regex)</title>
  <rect x="1" y="1" width="818" height="468" rx="14" fill="#ffffff" stroke="#D3D1C7" stroke-width="1"/>

  <text x="32" y="44" font-size="21" font-weight="500" fill="#2C2C2A">Cobertura de detección de ataques</text>
  <text x="32" y="68" font-size="14" fill="#5F5E5A">antes (substring) vs ahora (cascada regex de 3 pasadas) — medido</text>

  <g font-size="13">
    <rect x="560" y="34" width="12" height="12" rx="3" fill="#888780"/>
    <text x="578" y="44" fill="#5F5E5A">Antes</text>
    <rect x="636" y="34" width="12" height="12" rx="3" fill="#1D9E75"/>
    <text x="654" y="44" fill="#5F5E5A">Ahora</text>
  </g>

  <g>
    <text x="32" y="118" font-size="14" font-weight="500" fill="#2C2C2A">Ofuscados + español</text>
    <text x="32" y="137" font-size="12" fill="#888780">n = 20</text>

    <rect x="250" y="100" width="500" height="22" rx="4" fill="#F1EFE8"/>
    <rect x="250" y="100" width="50" height="22" rx="4" fill="#888780"/>
    <text x="312" y="116" font-size="13" font-weight="500" fill="#5F5E5A">10%</text>

    <rect x="250" y="130" width="500" height="22" rx="4" fill="#E1F5EE"/>
    <rect x="250" y="130" width="500" height="22" rx="4" fill="#1D9E75"/>
    <text x="726" y="146" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end">100%</text>
  </g>

  <g>
    <text x="32" y="208" font-size="14" font-weight="500" fill="#2C2C2A">Inglés plano</text>
    <text x="32" y="227" font-size="12" fill="#888780">n = 100</text>

    <rect x="250" y="190" width="500" height="22" rx="4" fill="#F1EFE8"/>
    <rect x="250" y="190" width="500" height="22" rx="4" fill="#888780"/>
    <text x="726" y="206" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end">100%</text>

    <rect x="250" y="220" width="500" height="22" rx="4" fill="#E1F5EE"/>
    <rect x="250" y="220" width="500" height="22" rx="4" fill="#1D9E75"/>
    <text x="726" y="236" font-size="13" font-weight="500" fill="#ffffff" text-anchor="end">100%</text>
  </g>

  <line x1="250" y1="100" x2="250" y2="242" stroke="#D3D1C7" stroke-width="1"/>

  <g>
    <rect x="250" y="262" width="180" height="20" rx="10" fill="#FAEEDA"/>
    <text x="262" y="276" font-size="12" font-weight="500" fill="#854F0B">+18 ataques nuevos capturados</text>
  </g>

  <line x1="32" y1="312" x2="788" y2="312" stroke="#F1EFE8" stroke-width="1"/>

  <g>
    <rect x="32" y="332" width="232" height="96" rx="10" fill="#F1EFE8"/>
    <text x="52" y="362" font-size="13" fill="#5F5E5A">Falsos positivos benignos</text>
    <text x="52" y="398" font-size="28" font-weight="500" fill="#0F6E56">0 / 40</text>
    <text x="52" y="418" font-size="12" fill="#888780">antes 0/40 · ahora 0/40</text>
  </g>
  <g>
    <rect x="294" y="332" width="232" height="96" rx="10" fill="#F1EFE8"/>
    <text x="314" y="362" font-size="13" fill="#5F5E5A">ASR con policy</text>
    <text x="314" y="398" font-size="28" font-weight="500" fill="#0F6E56">0.00</text>
    <text x="314" y="418" font-size="12" fill="#888780">baseline 0.40 → 1.00 → 0.00</text>
  </g>
  <g>
    <rect x="556" y="332" width="232" height="96" rx="10" fill="#F1EFE8"/>
    <text x="576" y="362" font-size="13" fill="#5F5E5A">Latencia</text>
    <text x="576" y="398" font-size="28" font-weight="500" fill="#2C2C2A">~59 µs</text>
    <text x="576" y="418" font-size="12" fill="#888780">~16.900 scans/s · 1 hilo</text>
  </g>
</svg>
